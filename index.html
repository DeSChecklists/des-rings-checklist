<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Demon's Souls Ring Checklist</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="fog"></div>
  <main class="shell">
    <header class="hero">
      <p class="eyebrow">Demon's Souls Remake</p>
      <h1>Ring Checklist</h1>
      <p class="subtitle">Track every ring for the King of Ring's trophy. Progress saves automatically in this browser.</p>
    </header>

    <section class="panel controls" aria-label="Checklist controls">
      <label class="search-wrap" for="searchInput">
        <span>⌕</span>
        <input id="searchInput" type="search" placeholder="Search ring, location, world, tendency..." autocomplete="off" />
      </label>

      <div class="filters" id="filters" aria-label="Filters"></div>

      <div class="progress-card">
        <div class="progress-text">
          <strong id="progressText">0 / 30 rings collected</strong>
          <span id="progressPercent">0%</span>
        </div>
        <div class="progress-track"><div id="progressFill" class="progress-fill"></div></div>
      </div>

      <div class="actions">
        <button id="resetBtn" type="button">Reset progress</button>
      </div>
    </section>

    <section id="ringsList" class="rings-list" aria-live="polite"></section>

    <footer class="footer">
      <p>Checklist data based on Milkies' ring document. Built by DeSChecklists.</p>
    </footer>
  </main>

  <script src="rings.js"></script>
  <script src="script.js"></script>
</body>
</html>
